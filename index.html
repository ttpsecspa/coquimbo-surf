<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SurfCoquimbo - Olas, Clima e Indicadores de Surf</title>
  <meta name="description" content="App de surf para Coquimbo, Chile. Olas, viento, clima, mareas e indicadores en tiempo real.">
  <meta name="theme-color" content="#00d4ff">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏄</text></svg>">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏄</text></svg>">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

    :root {
      --ocean-dark: #0a1628;
      --ocean-mid: #0f2847;
      --ocean-light: #1a4a7a;
      --surf-cyan: #00d4ff;
      --surf-teal: #00b4d8;
      --surf-green: #06d6a0;
      --surf-yellow: #ffd166;
      --surf-orange: #ff8c42;
      --surf-red: #ef476f;
      --sand: #f4e8c1;
      --white: #ffffff;
      --glass: rgba(255, 255, 255, 0.06);
      --glass-border: rgba(255, 255, 255, 0.1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--ocean-dark);
      color: var(--white);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated ocean background */
    .ocean-bg {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 0;
      background: linear-gradient(180deg, #0a1628 0%, #0f2847 40%, #1a4a7a 70%, #0f2847 100%);
    }

    .wave-layer {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 200%;
      height: 120px;
      opacity: 0.15;
    }

    .wave-layer:nth-child(1) {
      animation: wave 8s linear infinite;
      background: repeating-linear-gradient(90deg, transparent, transparent 100px, var(--surf-cyan) 100px, var(--surf-cyan) 200px);
      clip-path: polygon(0% 60%, 2% 55%, 5% 50%, 8% 48%, 12% 50%, 15% 55%, 18% 60%, 22% 58%, 25% 52%, 28% 48%, 32% 50%, 35% 55%, 38% 60%, 42% 58%, 45% 52%, 48% 48%, 52% 50%, 55% 55%, 58% 60%, 62% 58%, 65% 52%, 68% 48%, 72% 50%, 75% 55%, 78% 60%, 82% 58%, 85% 52%, 88% 48%, 92% 50%, 95% 55%, 98% 60%, 100% 58%, 100% 100%, 0% 100%);
    }

    .wave-layer:nth-child(2) {
      animation: wave 12s linear infinite reverse;
      bottom: -10px;
      opacity: 0.1;
      background: repeating-linear-gradient(90deg, transparent, transparent 150px, var(--surf-teal) 150px, var(--surf-teal) 300px);
      clip-path: polygon(0% 65%, 3% 58%, 7% 52%, 10% 50%, 14% 52%, 17% 58%, 20% 65%, 24% 60%, 27% 54%, 30% 50%, 34% 52%, 37% 58%, 40% 65%, 44% 60%, 47% 54%, 50% 50%, 54% 52%, 57% 58%, 60% 65%, 64% 60%, 67% 54%, 70% 50%, 74% 52%, 77% 58%, 80% 65%, 84% 60%, 87% 54%, 90% 50%, 94% 52%, 97% 58%, 100% 65%, 100% 100%, 0% 100%);
    }

    @keyframes wave {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    .app {
      position: relative;
      z-index: 1;
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    /* Header */
    .header {
      text-align: center;
      padding: 30px 0 20px;
    }

    .header h1 {
      font-size: 2.8rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--surf-cyan), var(--surf-green));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1px;
    }

    .header .subtitle {
      color: rgba(255,255,255,0.5);
      font-size: 0.95rem;
      margin-top: 4px;
      font-weight: 300;
    }

    .header .location {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
      padding: 6px 16px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      font-size: 0.85rem;
      color: var(--surf-cyan);
    }

    /* Alert banner */
    .alert-banner {
      display: none;
      align-items: center;
      gap: 10px;
      margin: 10px 0;
      padding: 12px 18px;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 500;
      animation: fadeIn 0.5s;
    }

    .alert-banner.show { display: flex; }
    .alert-epic { background: rgba(6,214,160,0.15); border: 1px solid rgba(6,214,160,0.3); color: var(--surf-green); }
    .alert-warn { background: rgba(239,71,111,0.15); border: 1px solid rgba(239,71,111,0.3); color: var(--surf-red); }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

    /* Spot selector */
    .spot-selector {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin: 20px 0;
      flex-wrap: wrap;
    }

    .spot-btn {
      padding: 8px 18px;
      border: 1px solid var(--glass-border);
      background: var(--glass);
      color: rgba(255,255,255,0.6);
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.85rem;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s;
    }

    .spot-btn:hover { border-color: var(--surf-cyan); color: var(--white); }
    .spot-btn.active {
      background: linear-gradient(135deg, var(--surf-cyan), var(--surf-teal));
      color: var(--ocean-dark);
      border-color: transparent;
      font-weight: 600;
    }

    /* Tabs */
    .tab-bar {
      display: flex;
      justify-content: center;
      gap: 4px;
      margin: 15px 0;
      background: var(--glass);
      border-radius: 14px;
      padding: 4px;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }

    .tab-btn {
      flex: 1;
      padding: 8px 12px;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.5);
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.8rem;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      transition: all 0.3s;
    }

    .tab-btn:hover { color: var(--white); }
    .tab-btn.active {
      background: rgba(0,212,255,0.15);
      color: var(--surf-cyan);
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; animation: fadeIn 0.3s; }

    /* Surf Score */
    .surf-score-section {
      text-align: center;
      margin: 25px 0;
    }

    .surf-score-ring {
      position: relative;
      display: inline-block;
      width: 180px;
      height: 180px;
    }

    .surf-score-ring svg { transform: rotate(-90deg); }

    .score-bg { stroke: rgba(255,255,255,0.08); }
    .score-fill {
      transition: stroke-dashoffset 1s ease, stroke 0.5s;
      stroke-linecap: round;
    }

    .score-label {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    .score-value {
      font-size: 3rem;
      font-weight: 900;
      line-height: 1;
    }

    .score-text {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.5);
      margin-top: 2px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .score-desc {
      margin-top: 10px;
      font-size: 1.1rem;
      font-weight: 600;
    }

    /* Best time suggestion */
    .best-time {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 12px;
      padding: 8px 20px;
      background: rgba(0,212,255,0.08);
      border: 1px solid rgba(0,212,255,0.2);
      border-radius: 20px;
      font-size: 0.85rem;
      color: var(--surf-cyan);
      display: inline-flex;
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 16px;
      margin: 20px 0;
    }

    .card {
      background: var(--glass);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 24px;
      transition: transform 0.2s, border-color 0.3s;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: rgba(0, 212, 255, 0.3);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .card-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
    }

    .card-title {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
    }

    .metric-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .metric-row:last-child { border-bottom: none; }

    .metric-label {
      color: rgba(255,255,255,0.6);
      font-size: 0.9rem;
    }

    .metric-value {
      font-size: 1.1rem;
      font-weight: 700;
    }

    .metric-big {
      font-size: 2.5rem;
      font-weight: 800;
      line-height: 1;
    }

    .metric-unit {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.4);
      font-weight: 400;
    }

    /* Wind direction compass */
    .compass {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.15);
      position: relative;
      margin: 10px auto;
    }

    .compass-arrow {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 4px;
      height: 34px;
      margin-left: -2px;
      margin-top: -34px;
      transform-origin: bottom center;
      transition: transform 1s ease;
    }

    .compass-arrow::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      border-left: 6px solid transparent;
      border-right: 6px solid transparent;
      border-bottom: 14px solid var(--surf-cyan);
    }

    .compass-arrow::after {
      content: '';
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      width: 2px;
      height: 20px;
      background: var(--surf-cyan);
    }

    .compass-labels {
      position: absolute;
      inset: -2px;
      font-size: 0.65rem;
      color: rgba(255,255,255,0.4);
    }

    .compass-labels span { position: absolute; }
    .compass-labels .n { top: 2px; left: 50%; transform: translateX(-50%); }
    .compass-labels .s { bottom: 2px; left: 50%; transform: translateX(-50%); }
    .compass-labels .e { right: 4px; top: 50%; transform: translateY(-50%); }
    .compass-labels .w { left: 4px; top: 50%; transform: translateY(-50%); }

    /* Tide chart canvas */
    .tide-canvas {
      width: 100%;
      height: 140px;
      margin-top: 10px;
      border-radius: 8px;
    }

    /* Hourly forecast */
    .hourly-scroll {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 10px 0;
      scrollbar-width: thin;
      scrollbar-color: var(--surf-cyan) transparent;
    }

    .hourly-scroll::-webkit-scrollbar { height: 4px; }
    .hourly-scroll::-webkit-scrollbar-track { background: transparent; }
    .hourly-scroll::-webkit-scrollbar-thumb { background: var(--surf-cyan); border-radius: 2px; }

    .hourly-item {
      flex: 0 0 70px;
      text-align: center;
      padding: 12px 8px;
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
      border: 1px solid transparent;
      transition: border-color 0.3s;
    }

    .hourly-item.now {
      border-color: var(--surf-cyan);
      background: rgba(0, 212, 255, 0.08);
    }

    .hourly-time {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.5);
      margin-bottom: 6px;
    }

    .hourly-wave {
      font-size: 1rem;
      font-weight: 700;
    }

    .hourly-wind {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.4);
      margin-top: 4px;
    }

    .hourly-period {
      font-size: 0.65rem;
      color: rgba(255,255,255,0.3);
      margin-top: 2px;
    }

    /* Swell decomposition */
    .swell-decomp {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .swell-decomp-title {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .swell-component {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      margin-bottom: 4px;
      background: rgba(255,255,255,0.03);
      border-radius: 8px;
      border-left: 3px solid;
    }

    .swell-component.primary { border-left-color: var(--surf-cyan); }
    .swell-component.secondary { border-left-color: var(--surf-teal); }
    .swell-component.wind-swell { border-left-color: var(--surf-yellow); }

    .swell-comp-label {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.5);
      min-width: 60px;
    }

    .swell-comp-data {
      font-size: 0.8rem;
      font-weight: 600;
      flex: 1;
    }

    .swell-comp-rating {
      font-size: 0.7rem;
      padding: 2px 6px;
      border-radius: 6px;
      font-weight: 600;
    }

    /* Swell rating badge */
    .swell-face {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: 8px;
      padding: 6px 12px;
      background: rgba(0,212,255,0.08);
      border: 1px solid rgba(0,212,255,0.15);
      border-radius: 10px;
      font-size: 0.85rem;
    }

    .swell-face-value {
      font-weight: 800;
      font-size: 1.1rem;
    }

    .swell-face-label {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.4);
    }

    /* Swell origin info */
    .swell-origin {
      margin-top: 8px;
      padding: 8px 10px;
      background: rgba(6,214,160,0.06);
      border: 1px solid rgba(6,214,160,0.1);
      border-radius: 8px;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.5);
    }

    .swell-origin-label {
      color: var(--surf-green);
      font-weight: 600;
    }

    /* 16-day forecast */
    .forecast-day {
      display: grid;
      grid-template-columns: 80px 1fr 80px 80px;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      gap: 10px;
    }

    .forecast-day:last-child { border-bottom: none; }

    .forecast-day-name {
      font-weight: 600;
      font-size: 0.9rem;
    }

    .forecast-bar-container {
      height: 8px;
      background: rgba(255,255,255,0.08);
      border-radius: 4px;
      overflow: hidden;
    }

    .forecast-bar {
      height: 100%;
      border-radius: 4px;
      transition: width 1s ease;
    }

    .forecast-wave, .forecast-wind {
      text-align: right;
      font-size: 0.85rem;
    }

    .forecast-wave { font-weight: 700; }
    .forecast-wind { color: rgba(255,255,255,0.5); }

    .forecast-section-label {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 12px 0 4px;
      border-top: 1px solid rgba(255,255,255,0.06);
      margin-top: 4px;
    }

    /* Indicator badges */
    .indicator-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .indicator {
      text-align: center;
      padding: 14px 8px;
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
    }

    .indicator-emoji { font-size: 1.5rem; margin-bottom: 4px; }

    .indicator-label {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .indicator-value {
      font-size: 1rem;
      font-weight: 700;
      margin-top: 2px;
    }

    /* Status badges */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .badge-epic { background: rgba(6, 214, 160, 0.2); color: var(--surf-green); }
    .badge-good { background: rgba(0, 180, 216, 0.2); color: var(--surf-teal); }
    .badge-fair { background: rgba(255, 209, 102, 0.2); color: var(--surf-yellow); }
    .badge-poor { background: rgba(239, 71, 111, 0.2); color: var(--surf-red); }

    /* Compare spots mini */
    .compare-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
    }

    /* Board recommendation */
    .board-rec {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px;
      background: rgba(0,212,255,0.06);
      border: 1px solid rgba(0,212,255,0.15);
      border-radius: 14px;
      margin-top: 12px;
    }

    .board-emoji {
      font-size: 2.2rem;
      flex-shrink: 0;
    }

    .board-info { flex: 1; }

    .board-name {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--surf-cyan);
    }

    .board-size {
      font-size: 0.85rem;
      color: var(--surf-yellow);
      font-weight: 600;
      margin-top: 2px;
    }

    .board-detail {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.5);
      margin-top: 4px;
      line-height: 1.3;
    }

    .compare-spot {
      text-align: center;
      padding: 16px 8px;
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s;
      border: 1px solid transparent;
    }

    .compare-spot:hover { border-color: var(--surf-cyan); }
    .compare-spot.selected { border-color: var(--surf-cyan); background: rgba(0,212,255,0.08); }

    .compare-name {
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .compare-score {
      font-size: 1.8rem;
      font-weight: 900;
      line-height: 1;
    }

    .compare-detail {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.4);
      margin-top: 4px;
    }

    /* Full width card */
    .card-full { grid-column: 1 / -1; }

    /* Board + indicators layout */
    .board-indicators-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      align-items: start;
    }

    @media (max-width: 768px) {
      .board-indicators-layout { grid-template-columns: 1fr; }
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 60px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: var(--surf-cyan);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      color: rgba(255,255,255,0.4);
      font-size: 0.9rem;
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 30px 0;
      color: rgba(255,255,255,0.3);
      font-size: 0.8rem;
    }

    .footer a { color: var(--surf-cyan); text-decoration: none; }

    /* Responsive */
    @media (max-width: 768px) {
      .header h1 { font-size: 2rem; }
      .grid { grid-template-columns: 1fr; }
      .forecast-day { grid-template-columns: 60px 1fr 60px 60px; }
      .app { padding: 12px; }
      .card { padding: 18px; }
      .indicator-grid { grid-template-columns: repeat(2, 1fr); }
      .compare-grid { grid-template-columns: 1fr 1fr; }
    }

    /* Refresh button */
    .refresh-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--surf-cyan), var(--surf-teal));
      border: none;
      color: var(--ocean-dark);
      font-size: 1.3rem;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(0, 212, 255, 0.3);
      transition: transform 0.3s;
      z-index: 10;
    }

    .refresh-btn:hover { transform: scale(1.1); }
    .refresh-btn.spinning { animation: spin 0.8s linear infinite; }

    /* Share button */
    .share-btn {
      position: fixed;
      bottom: 24px;
      right: 84px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      color: var(--white);
      font-size: 1.2rem;
      cursor: pointer;
      transition: all 0.3s;
      z-index: 10;
    }

    .share-btn:hover { border-color: var(--surf-cyan); transform: scale(1.1); }

    /* Auto-refresh indicator */
    .auto-refresh {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .auto-refresh-dot {

    @keyframes pulse {

    .last-updated {

    /* Install prompt */

<body>
  <div class="ocean-bg">

  <div class="app" id="app">
    <header class="header">

      <div class="location">

    <div class="install-banner" id="install-banner" onclick="installApp()">
      📲 Instalar SurfCoquimbo en tu dispositivo
    </div>

    <div class="alert-banner" id="alert-banner"></div>

    <div class="spot-selector" id="spot-selector">
      <button class="spot-btn active" data-lat="-30.0718" data-lon="-71.3768" data-name="Totoralillo">Totoralillo</button>
      <button class="spot-btn" data-lat="-29.2430" data-lon="-71.4652" data-name="Punta de Choros">Punta de Choros</button>
      <button class="spot-btn" data-lat="-29.9055" data-lon="-71.2761" data-name="El Faro">El Faro</button>

    <div class="tab-bar">
      <button class="tab-btn active" data-tab="ahora">Ahora</button>
      <button class="tab-btn" data-tab="horario">Horario</button>
      <button class="tab-btn" data-tab="semanal">16 Dias</button>
      <button class="tab-btn" data-tab="comparar">Comparar</button>
    </div>

    <div id="content">
      <div class="loading">
        <div class="spinner"></div>
        <p class="loading-text">Cargando datos del oceano...</p>
      </div>
    </div>
  </div>

  <button class="share-btn" id="share-btn" title="Compartir condiciones">📤</button>
  <button class="refresh-btn" id="refresh-btn" title="Actualizar datos">↻</button>

  <script>
    // ========== CONFIG ==========
    const SPOTS = {
      'Totoralillo': { lat: -30.0718, lon: -71.3768, facing: 'W', bestWind: 'ENE', bestSwell: 'WSW', type: 'point break', waveRange: '1.0-2.5m+', level: 'Intermedio-Avanzado', desc: 'Peninsula con 3 point breaks (Pipe, El Muro, Derecharcha): 2 derechas y 1 izquierda. Olas huecas y potentes sobre fondo de roca. Mejor Mar-Jun. Cuidado: erizos y rocas.', hazards: 'Erizos, rocas, secciones poco profundas' },
      'Punta de Choros': { lat: -29.2430, lon: -71.4652, facing: 'W', bestWind: 'ESE', bestSwell: 'SW', type: 'beach break', waveRange: '1.0-2.5m', level: 'Todos', desc: 'Beach break protegido con izquierdas y derechas sobre arena y rocas. Poco crowd, vacio entre semana. Mejor en otono-invierno (mayo). 500m norte de la caleta.', hazards: 'Corrientes, rocas' },
      'El Faro': { lat: -29.9055, lon: -71.2761, facing: 'WNW', bestWind: 'ESE', bestSwell: 'SW', type: 'beach break', waveRange: '0.3-1.5m', level: 'Principiante-Intermedio', desc: 'Beach break junto al Faro Monumental en Av. del Mar. Picos A-frame pero frecuentes cierres. El mas consistente de las 12 playas de La Serena. Ideal para aprender.', hazards: 'Cierres frecuentes, corrientes' },
      'Tongoy': { lat: -30.2611, lon: -71.4939, facing: 'N', bestWind: 'S', bestSwell: 'NW', type: 'beach break', waveRange: '0.3-1.0m', level: 'Principiante', desc: 'Bahia protegida por Punta Lengua de Vaca. Playa Grande (26km) con olas chicas y suaves. Ideal para SUP, bodyboard y principiantes absolutos. Pueblo pesquero turistico.', hazards: 'Minimos - playa segura' },
    };

    let currentSpot = 'Totoralillo';
    let currentData = null;
    let allSpotsData = {};
    let autoRefreshTimer = null;
    let deferredPrompt = null;

    // ========== PWA INSTALL ==========
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('install-banner').classList.add('show');
    });

    function installApp() {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(() => {
        deferredPrompt = null;
        document.getElementById('install-banner').classList.remove('show');
      });
    }

    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }

    // ========== TAB SYSTEM ==========
    document.querySelector('.tab-bar').addEventListener('click', (e) => {
      const btn = e.target.closest('.tab-btn');
      if (!btn) return;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      // Re-render compare tab with latest data when switching to it
      if (btn.dataset.tab === 'comparar' && currentData) {
        renderDashboard(currentData.marine, currentData.weather);
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        const tab = document.getElementById('tab-comparar');
        if (tab) tab.classList.add('active');
        return;
      }

      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      const tab = document.getElementById('tab-' + btn.dataset.tab);
      if (tab) tab.classList.add('active');
    });

    // ========== SPOT SELECTOR ==========
    document.getElementById('spot-selector').addEventListener('click', (e) => {
      const btn = e.target.closest('.spot-btn');
      if (!btn) return;
      document.querySelectorAll('.spot-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentSpot = btn.textContent.trim();
      document.getElementById('spot-name').textContent = btn.dataset.name + ', Coquimbo';
      fetchData(parseFloat(btn.dataset.lat), parseFloat(btn.dataset.lon));
    });

    // ========== REFRESH ==========
    document.getElementById('refresh-btn').addEventListener('click', () => {
      const spot = SPOTS[currentSpot];
      const btn = document.getElementById('refresh-btn');
      btn.classList.add('spinning');
      fetchData(spot.lat, spot.lon).finally(() => {
        setTimeout(() => btn.classList.remove('spinning'), 500);
      });
    });

    // Auto-refresh every 15 min
    function startAutoRefresh() {
      if (autoRefreshTimer) clearInterval(autoRefreshTimer);
      autoRefreshTimer = setInterval(() => {
        const spot = SPOTS[currentSpot];
        fetchData(spot.lat, spot.lon);
      }, 15 * 60 * 1000);
    }

    // ========== SHARE ==========
    document.getElementById('share-btn').addEventListener('click', () => {
      if (!currentData) return;
      const m = currentData.marine;
      const w = currentData.weather;
      const now = new Date();
      let ci = findCurrentHourIdx(m);
      const wh = m.hourly?.wave_height?.[ci] ?? 0;
      const wp = m.hourly?.wave_period?.[ci] ?? 0;
      const ws = w.current?.windspeed_10m ?? 0;

      const text = `🏄 SurfCoquimbo - ${currentSpot}\n🌊 Olas: ${wh.toFixed(1)}m @ ${wp.toFixed(0)}s\n💨 Viento: ${ws.toFixed(0)} km/h\n🎯 Score: ${getSurfScore(wh, wp, ws, w.current?.winddirection_10m ?? 0)}/100\n📅 ${now.toLocaleDateString('es-CL')}\n\nhttps://ttpsecspa.github.io/coquimbo-surf/`;

      if (navigator.share) {
        navigator.share({ title: 'SurfCoquimbo', text }).catch(() => {});
      } else {
        navigator.clipboard.writeText(text).then(() => {
          const btn = document.getElementById('share-btn');
          btn.textContent = '✅';
          setTimeout(() => btn.textContent = '📤', 2000);
        });
      }
    });

    // ========== DATA FETCH ==========
    async function fetchData(lat, lon) {
      const content = document.getElementById('content');
      if (!currentData) {
        content.innerHTML = `<div class="loading"><div class="spinner"></div><p class="loading-text">Cargando datos del oceano...</p></div>`;
      }

      try {
        const [marineRes, weatherRes] = await Promise.all([
          fetch(`https://marine-api.open-meteo.com/v1/marine?latitude=${lat}&longitude=${lon}&hourly=wave_height,wave_direction,wave_period,swell_wave_height,swell_wave_direction,swell_wave_period,secondary_swell_wave_height,secondary_swell_wave_direction,secondary_swell_wave_period,sea_surface_temperature&daily=wave_height_max,wave_direction_dominant,wave_period_max,swell_wave_height_max,swell_wave_period_max,swell_wave_direction_dominant&timezone=America/Santiago&forecast_days=16`),
          fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m,windspeed_10m,winddirection_10m,weathercode,uv_index&daily=temperature_2m_max,temperature_2m_min,sunrise,sunset,uv_index_max&current=temperature_2m,windspeed_10m,winddirection_10m,weathercode,uv_index&timezone=America/Santiago&forecast_days=16`)
        ]);

        const marine = await marineRes.json();
        const weather = await weatherRes.json();

        currentData = { marine, weather };
        allSpotsData[currentSpot] = { marine, weather };
        renderDashboard(marine, weather);
        startAutoRefresh();

        // Fetch other spots in background for compare tab
        fetchOtherSpots();
      } catch (err) {
        content.innerHTML = `<div class="loading"><p class="loading-text">Error al cargar datos. Verifica tu conexion.</p><p class="loading-text" style="margin-top:8px;font-size:0.75rem;color:rgba(255,255,255,0.2)">${err.message}</p></div>`;
      }
    }

    async function fetchOtherSpots() {
      for (const [name, spot] of Object.entries(SPOTS)) {
        if (name === currentSpot || allSpotsData[name]) continue;
        try {
          const [mRes, wRes] = await Promise.all([
            fetch(`https://marine-api.open-meteo.com/v1/marine?latitude=${spot.lat}&longitude=${spot.lon}&hourly=wave_height,wave_direction,wave_period,swell_wave_height,swell_wave_direction,swell_wave_period&daily=wave_height_max,wave_direction_dominant,wave_period_max&timezone=America/Santiago&forecast_days=16`),
            fetch(`https://api.open-meteo.com/v1/forecast?latitude=${spot.lat}&longitude=${spot.lon}&hourly=windspeed_10m,winddirection_10m&current=windspeed_10m,winddirection_10m&timezone=America/Santiago&forecast_days=16`)
          ]);
          allSpotsData[name] = { marine: await mRes.json(), weather: await wRes.json() };
        } catch (e) {}
      }
    }

    // ========== HELPERS ==========
    function findCurrentHourIdx(marine) {
      const now = new Date();
      const currentHour = now.getHours();
      const todayStr = now.toISOString().split('T')[0];
      let idx = 0;
      if (marine.hourly?.time) {
        for (let i = 0; i < marine.hourly.time.length; i++) {
          if (new Date(marine.hourly.time[i]).getHours() === currentHour &&
              marine.hourly.time[i].startsWith(todayStr)) {
            idx = i;
            break;
          }
        }
      }
      return idx;
    }

    function getWindName(deg) {
      const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
      return dirs[Math.round(deg / 22.5) % 16];
    }

    function getSurfScore(waveHeight, wavePeriod, windSpeed, windDir) {
      const spot = SPOTS[currentSpot];
      let score = 0;

      if (waveHeight >= 0.5 && waveHeight <= 3.0) {
        score += Math.min(30, waveHeight * 15);
      } else if (waveHeight > 3.0) {
        score += Math.max(0, 30 - (waveHeight - 3) * 10);
      }

      score += Math.min(30, wavePeriod * 2.5);

      const windDirName = getWindName(windDir);
      const isOffshore = spot.bestWind.includes(windDirName[0]);
      if (windSpeed < 5) score += 25;
      else if (windSpeed < 15 && isOffshore) score += 20;
      else if (windSpeed < 15) score += 10;
      else if (windSpeed < 25) score += 5;

      if (wavePeriod > 10) score += 15;
      else if (wavePeriod > 7) score += 10;
      else if (wavePeriod > 5) score += 5;

      return Math.min(100, Math.round(score));
    }

    function getSurfScoreForSpot(spotName, waveHeight, wavePeriod, windSpeed, windDir) {
      const spot = SPOTS[spotName];
      let score = 0;
      if (waveHeight >= 0.5 && waveHeight <= 3.0) score += Math.min(30, waveHeight * 15);
      else if (waveHeight > 3.0) score += Math.max(0, 30 - (waveHeight - 3) * 10);
      score += Math.min(30, wavePeriod * 2.5);
      const windDirName = getWindName(windDir);
      const isOffshore = spot.bestWind.includes(windDirName[0]);
      if (windSpeed < 5) score += 25;
      else if (windSpeed < 15 && isOffshore) score += 20;
      else if (windSpeed < 15) score += 10;
      else if (windSpeed < 25) score += 5;
      if (wavePeriod > 10) score += 15;
      else if (wavePeriod > 7) score += 10;
      else if (wavePeriod > 5) score += 5;
      return Math.min(100, Math.round(score));
    }

    function getScoreColor(score) {
      if (score >= 75) return 'var(--surf-green)';
      if (score >= 50) return 'var(--surf-teal)';
      if (score >= 30) return 'var(--surf-yellow)';
      return 'var(--surf-red)';
    }

    function getScoreColorHex(score) {
      if (score >= 75) return '#06d6a0';
      if (score >= 50) return '#00b4d8';
      if (score >= 30) return '#ffd166';
      return '#ef476f';
    }

    function getScoreLabel(score) {
      if (score >= 75) return 'EPICO';
      if (score >= 50) return 'BUENO';
      if (score >= 30) return 'REGULAR';
      return 'MALO';
    }

    function getScoreBadgeClass(score) {
      if (score >= 75) return 'badge-epic';
      if (score >= 50) return 'badge-good';
      if (score >= 30) return 'badge-fair';
      return 'badge-poor';
    }

    // ========== SWELL RATING SYSTEM (Stormsurf-inspired) ==========
    // Converts deep-water swell amplitude + period → breaking wave face height
    // Uses empirical shoaling/refraction for Chilean coast (steep continental shelf)
    function getSwellRating(amplitude, period) {
      if (!amplitude || !period || amplitude < 0.1) return { face: 0, rating: 'FLAT', color: 'rgba(255,255,255,0.3)', stars: 0 };

      // Empirical wave face formula: face = amplitude * shoaling_factor * period_boost
      // Shoaling factor for steep Chilean shelf: ~1.3-1.6x depending on period
      const shoalingFactor = 1.3 + (period / 25) * 0.3; // longer period = more shoaling
      // Period energy boost: E ∝ period², so longer period = disproportionately bigger waves
      const periodBoost = 1.0 + Math.max(0, (period - 8)) * 0.06;
      const face = amplitude * shoalingFactor * periodBoost;

      let rating, color, stars;
      if (face < 0.3) { rating = 'FLAT'; color = 'rgba(255,255,255,0.3)'; stars = 0; }
      else if (face < 0.6) { rating = 'SMALL'; color = 'var(--surf-yellow)'; stars = 1; }
      else if (face < 1.2) { rating = 'FAIR'; color = 'var(--surf-teal)'; stars = 2; }
      else if (face < 2.0) { rating = 'GOOD'; color = 'var(--surf-cyan)'; stars = 3; }
      else if (face < 3.0) { rating = 'EPIC'; color = 'var(--surf-green)'; stars = 4; }
      else { rating = 'XXL'; color = 'var(--surf-red)'; stars = 5; }

      return { face: Math.round(face * 10) / 10, rating, color, stars };
    }

    // Swell origin estimation based on direction and period
    // Longer period = more distant storm origin
    function getSwellOrigin(direction, period) {
      const dir = getWindName(direction);

      // Estimate distance from period: group velocity ~ 1.56 * period (m/s)
      // Travel time approximation in hours: distance / (group_velocity * 3.6)
      const groupVelocity = 1.56 * period; // m/s
      const estimatedDistKm = Math.round(groupVelocity * 3.6 * period * 2.5); // rough estimate

      // Swell origin regions for Coquimbo based on direction
      let origin = 'Desconocido';
      let zone = '';

      if (dir.includes('SW') || dir === 'S' || dir === 'SSW') {
        if (period >= 14) { origin = 'Oceano Austral / Antartida'; zone = 'Tormentas roaring 40s-50s'; }
        else if (period >= 10) { origin = 'Pacifico Sur profundo'; zone = 'Sistema frontal lejano'; }
        else { origin = 'Pacifico Sur cercano'; zone = 'Viento local/regional'; }
      } else if (dir.includes('W') || dir === 'WNW' || dir === 'WSW') {
        if (period >= 16) { origin = 'Pacifico Central / Nueva Zelanda'; zone = 'Tormenta trans-oceanica'; }
        else if (period >= 12) { origin = 'Pacifico Sur-Central'; zone = 'Baja presion extratropical'; }
        else { origin = 'Pacifico Oriental'; zone = 'Sistema costero'; }
      } else if (dir.includes('NW') || dir === 'N' || dir === 'NNW') {
        if (period >= 14) { origin = 'Pacifico Norte / Hawaii'; zone = 'Tormenta hemisferio norte'; }
        else if (period >= 10) { origin = 'Pacifico Nor-Oriental'; zone = 'Sistema lejano del norte'; }
        else { origin = 'Costa norte Chile'; zone = 'Viento costero'; }
      } else {
        origin = 'Wind swell local';
        zone = 'Generado por viento local';
      }

      return { origin, zone, distKm: estimatedDistKm, travelHours: Math.round(estimatedDistKm / (groupVelocity * 3.6)) };
    }

    // Swell decay estimation: how much energy remains after traveling
    function getSwellDecay(period, distKm) {
      // Longer period swells decay less over distance
      // Decay factor: exp(-distance / (period * decay_constant))
      const decayConstant = 800; // km per period-second
      const decay = Math.exp(-distKm / (period * decayConstant));
      return Math.round(decay * 100);
    }

    // Board recommendation based on wave height, period, spot type and wind
    function getBoardRec(waveHeight, wavePeriod, windSpeed, spotType) {
      const spot = SPOTS[currentSpot];
      const isPointBreak = (spotType || spot?.type || '').includes('point');
      const isClean = (windSpeed || 0) < 10;
      const isPowerful = wavePeriod > 10;

      if (waveHeight < 0.3) return {
        board: 'SUP / Bodyboard',
        emoji: '🏄‍♀️',
        detail: 'Olas muy chicas para surfear. SUP para remar y disfrutar, bodyboard para divertirse en la orilla.',
        size: '9-11 ft (SUP) / 42" (BB)',
        quillas: 'Single fin (SUP)',
        nivel: 'Todos los niveles',
        tip: 'Aprovecha para practicar remada y equilibrio'
      };

      if (waveHeight < 0.6) return {
        board: 'Longboard',
        emoji: '🏄',
        detail: 'Olas muy suaves. Longboard con mucho volumen para atrapar todo. Ideal para practicar pop-up y giros basicos.',
        size: '9\'0"-10\'0"',
        quillas: 'Single fin o 2+1',
        nivel: 'Principiante a intermedio',
        tip: 'Rema con fuerza y ponete de pie rapido'
      };

      if (waveHeight < 1.0) {
        if (wavePeriod < 8) return {
          board: 'Longboard / Funboard',
          emoji: '🏄',
          detail: 'Olas chicas de viento corto. Necesitas volumen para generar velocidad. Funboard si ya tienes nivel.',
          size: '7\'6"-9\'6"',
          quillas: '2+1 o thruster',
          nivel: 'Principiante a intermedio',
          tip: 'Busca las series mas grandes y posicionate bien'
        };
        return {
          board: 'Funboard / Mini-mal',
          emoji: '🏄',
          detail: 'Olas chicas pero con empuje de groundswell. Funboard para equilibrio entre remada y maniobrabilidad.',
          size: '7\'0"-8\'6"',
          quillas: 'Thruster o 2+1',
          nivel: 'Todos los niveles',
          tip: isPowerful ? 'Groundswell = mas fuerza de la que parece' : 'Posicionate en el pico para atrapar mas olas'
        };
      }

      if (waveHeight < 1.5) {
        if (isPointBreak && isClean) return {
          board: 'Fish / Retro Fish',
          emoji: '🐟',
          detail: `Olas medianas en ${isPointBreak ? 'point break' : 'beach break'} con poco viento. Fish para velocidad y flow en paredes.`,
          size: '5\'6"-6\'4"',
          quillas: 'Twin fin o quad',
          nivel: 'Intermedio a avanzado',
          tip: 'Usa el twin/quad para proyectarte en secciones rapidas'
        };
        if (wavePeriod < 8) return {
          board: 'Funboard / Fish',
          emoji: '🐟',
          detail: 'Olas medianas de periodo corto. Fish o funboard para compensar la falta de empuje con volumen extra.',
          size: '6\'0"-7\'6"',
          quillas: 'Thruster o quad',
          nivel: 'Intermedio',
          tip: 'Rema fuerte, estas olas no empujan mucho'
        };
        return {
          board: 'Fish / Hybrid',
          emoji: '🐟',
          detail: 'Olas medianas con buen periodo. Fish para velocidad o hibrida para mas versatilidad y maniobras.',
          size: '5\'8"-6\'6"',
          quillas: 'Quad o thruster',
          nivel: 'Intermedio',
          tip: 'Buenas condiciones para practicar bottom turns'
        };
      }

      if (waveHeight < 2.0) {
        if (isPointBreak) return {
          board: 'Shortboard',
          emoji: '🏄‍♂️',
          detail: `Point break con olas de ${waveHeight.toFixed(1)}m. Shortboard de performance para maniobras en la pared y tubos.`,
          size: '5\'8"-6\'2"',
          quillas: 'Thruster',
          nivel: 'Intermedio-Avanzado',
          tip: 'Busca las secciones huecas para tubos'
        };
        return {
          board: 'Shortboard / Fish',
          emoji: '🏄‍♂️',
          detail: 'Buen tamano para performance. Shortboard si buscas maniobras verticales, fish si prefieres velocidad y flow.',
          size: '5\'6"-6\'4"',
          quillas: 'Thruster (short) / Quad (fish)',
          nivel: 'Intermedio a avanzado',
          tip: isPowerful ? 'Groundswell potente - buen dia para progresar' : 'Conecta secciones y practica aereos'
        };
      }

      if (waveHeight < 2.5) {
        return {
          board: 'Shortboard',
          emoji: '🏄‍♂️',
          detail: `Olas potentes de ${waveHeight.toFixed(1)}m${isPowerful ? ' con groundswell largo' : ''}. Shortboard de performance con algo de rocker para drops verticales.`,
          size: '5\'10"-6\'2"',
          quillas: 'Thruster',
          nivel: 'Avanzado',
          tip: 'Cuidado con las series grandes, posicionate bien en el lineup'
        };
      }

      if (waveHeight < 3.5) {
        return {
          board: 'Step-up',
          emoji: '⚡',
          detail: `Olas grandes de ${waveHeight.toFixed(1)}m. Necesitas mas tabla para entrar y velocidad en paredes grandes. No para principiantes.`,
          size: '6\'2"-7\'0"',
          quillas: 'Thruster con quillas grandes',
          nivel: 'Avanzado',
          tip: 'Tabla con mas largo y rocker para late drops. Usa leash largo.'
        };
      }

      return {
        board: 'Gun',
        emoji: '🔱',
        detail: `Olas muy grandes (${waveHeight.toFixed(1)}m+). Gun para maxima velocidad y control. Solo surfistas MUY experimentados.`,
        size: '7\'0"-9\'0"',

        nivel: 'Experto',
        tip: 'Condiciones peligrosas. Nunca surfees solo. Lleva chaleco de impacto.'
      };
    }

    function getWeatherIcon(code) {
      if (code <= 1) return '☀️';
      if (code <= 3) return '⛅';
      if (code <= 48) return '🌫️';
      if (code <= 67) return '🌧️';
      if (code <= 77) return '🌨️';
      if (code <= 82) return '🌦️';
      return '⛈️';
    }

    function formatTime(isoStr) {
      return new Date(isoStr).toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit' });
    }

    function getDayName(isoStr, i) {
      if (i === 0) return 'Hoy';
      if (i === 1) return 'Mañana';
      const d = new Date(isoStr);
      const weekday = d.toLocaleDateString('es-CL', { weekday: 'short' }).replace('.', '');
      if (i >= 7) {
        const dayNum = d.getDate();
        const month = d.toLocaleDateString('es-CL', { month: 'short' }).replace('.', '');
        return `${weekday} ${dayNum}/${month}`;
      }
      return weekday;
    }

    // Moon phase calculation
    function getMoonPhase(date) {
      const year = date.getFullYear();
      const month = date.getMonth() + 1;
      const day = date.getDate();
      let c = Math.floor(365.25 * (year + 4716));
      let e = Math.floor(30.6001 * (month < 3 ? month + 13 : month + 1));
      let jd = c + e + day - 1524.5;
      let daysSinceNew = (jd - 2451550.1) % 29.530588853;
      if (daysSinceNew < 0) daysSinceNew += 29.530588853;
      const phase = daysSinceNew / 29.530588853;

      if (phase < 0.0625) return { emoji: '🌑', name: 'Luna nueva', effect: 'Mareas extremas' };
      if (phase < 0.1875) return { emoji: '🌒', name: 'Creciente', effect: 'Mareas creciendo' };
      if (phase < 0.3125) return { emoji: '🌓', name: 'Cuarto creciente', effect: 'Mareas moderadas' };
      if (phase < 0.4375) return { emoji: '🌔', name: 'Gibosa creciente', effect: 'Mareas aumentando' };
      if (phase < 0.5625) return { emoji: '🌕', name: 'Luna llena', effect: 'Mareas extremas' };
      if (phase < 0.6875) return { emoji: '🌖', name: 'Gibosa menguante', effect: 'Mareas bajando' };
      if (phase < 0.8125) return { emoji: '🌗', name: 'Cuarto menguante', effect: 'Mareas moderadas' };
      if (phase < 0.9375) return { emoji: '🌘', name: 'Menguante', effect: 'Mareas bajando' };
      return { emoji: '🌑', name: 'Luna nueva', effect: 'Mareas extremas' };
    }

    // Simulated tide based on moon phase and time
    function getTideData(now) {
      const hours = [];
      const moon = getMoonPhase(now);
      const isExtreme = moon.name === 'Luna nueva' || moon.name === 'Luna llena';
      const amplitude = isExtreme ? 1.8 : 1.2;

      for (let h = 0; h < 24; h++) {
        // Semi-diurnal tide: ~2 highs and 2 lows per day
        const t = h / 24 * Math.PI * 4;
        const tide = amplitude * Math.sin(t + now.getDate() * 0.5) * 0.5 + 0.8;
        hours.push({ hour: h, level: Math.max(0, tide) });
      }
      return hours;
    }

    // Find best surf time today
    function findBestTime(marine, weather) {
      const now = new Date();
      const todayStr = now.toISOString().split('T')[0];
      let bestScore = 0;
      let bestHour = null;

      if (!marine.hourly?.time) return null;

      for (let i = 0; i < marine.hourly.time.length; i++) {
        if (!marine.hourly.time[i].startsWith(todayStr)) continue;
        const h = new Date(marine.hourly.time[i]).getHours();
        if (h < 6 || h > 19) continue; // daylight hours only

        const wh = marine.hourly.wave_height?.[i] ?? 0;
        const wp = marine.hourly.wave_period?.[i] ?? 0;
        const ws = weather.hourly?.windspeed_10m?.[i] ?? 0;
        const wd = weather.hourly?.winddirection_10m?.[i] ?? 0;
        const score = getSurfScore(wh, wp, ws, wd);

        if (score > bestScore) {
          bestScore = score;
          bestHour = h;
        }
      }

      return bestHour !== null ? { hour: bestHour, score: bestScore } : null;
    }

    // ========== TIDE CHART DRAWING ==========
    function drawTideChart(canvasId, tideData, currentHour) {
      const canvas = document.getElementById(canvasId);
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const dpr = window.devicePixelRatio || 1;

      canvas.width = canvas.offsetWidth * dpr;
      canvas.height = canvas.offsetHeight * dpr;
      ctx.scale(dpr, dpr);

      const w = canvas.offsetWidth;
      const h = canvas.offsetHeight;
      const padding = { top: 20, bottom: 25, left: 10, right: 10 };
      const chartW = w - padding.left - padding.right;
      const chartH = h - padding.top - padding.bottom;

      // Background
      ctx.clearRect(0, 0, w, h);

      // Find max
      const maxLevel = Math.max(...tideData.map(d => d.level));

      // Draw curve
      ctx.beginPath();
      ctx.moveTo(padding.left, padding.top + chartH);

      tideData.forEach((d, i) => {
        const x = padding.left + (i / 23) * chartW;
        const y = padding.top + chartH - (d.level / maxLevel) * chartH;
        if (i === 0) {
          ctx.moveTo(x, y);
        } else {
          const prev = tideData[i - 1];
          const prevX = padding.left + ((i - 1) / 23) * chartW;
          const prevY = padding.top + chartH - (prev.level / maxLevel) * chartH;
          const cpx = (prevX + x) / 2;
          ctx.bezierCurveTo(cpx, prevY, cpx, y, x, y);
        }
      });

      // Fill under curve
      const lastX = padding.left + chartW;
      const lastY = padding.top + chartH - (tideData[23].level / maxLevel) * chartH;
      ctx.lineTo(lastX, padding.top + chartH);
      ctx.lineTo(padding.left, padding.top + chartH);
      ctx.closePath();

      const gradient = ctx.createLinearGradient(0, padding.top, 0, padding.top + chartH);
      gradient.addColorStop(0, 'rgba(0, 180, 216, 0.3)');
      gradient.addColorStop(1, 'rgba(0, 180, 216, 0.02)');
      ctx.fillStyle = gradient;
      ctx.fill();

      // Stroke line
      ctx.beginPath();
      tideData.forEach((d, i) => {
        const x = padding.left + (i / 23) * chartW;
        const y = padding.top + chartH - (d.level / maxLevel) * chartH;
        if (i === 0) ctx.moveTo(x, y);
        else {
          const prev = tideData[i - 1];
          const prevX = padding.left + ((i - 1) / 23) * chartW;
          const prevY = padding.top + chartH - (prev.level / maxLevel) * chartH;
          const cpx = (prevX + x) / 2;
          ctx.bezierCurveTo(cpx, prevY, cpx, y, x, y);
        }
      });
      ctx.strokeStyle = '#00b4d8';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Current time marker
      if (currentHour >= 0 && currentHour <= 23) {
        const cx = padding.left + (currentHour / 23) * chartW;
        const cy = padding.top + chartH - (tideData[currentHour].level / maxLevel) * chartH;

        ctx.beginPath();
        ctx.arc(cx, cy, 5, 0, Math.PI * 2);
        ctx.fillStyle = '#00d4ff';
        ctx.fill();
        ctx.strokeStyle = '#0a1628';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Label
        ctx.fillStyle = '#00d4ff';
        ctx.font = '11px Inter, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(`${tideData[currentHour].level.toFixed(1)}m`, cx, cy - 10);
      }

      // Hour labels
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.font = '10px Inter, sans-serif';
      ctx.textAlign = 'center';
      [0, 6, 12, 18, 23].forEach(h => {
        const x = padding.left + (h / 23) * chartW;
        ctx.fillText(h + ':00', x, h + padding.top + chartH + 15);
      });

      // High/Low labels
      let maxIdx = 0, minIdx = 0;
      tideData.forEach((d, i) => {
        if (d.level > tideData[maxIdx].level) maxIdx = i;
        if (d.level < tideData[minIdx].level) minIdx = i;
      });

      ctx.font = 'bold 10px Inter, sans-serif';
      const highX = padding.left + (maxIdx / 23) * chartW;
      const highY = padding.top + chartH - (tideData[maxIdx].level / maxLevel) * chartH;
      ctx.fillStyle = 'rgba(0,212,255,0.6)';
      ctx.fillText('ALTA', highX, highY - 8);

      const lowX = padding.left + (minIdx / 23) * chartW;
      const lowY = padding.top + chartH - (tideData[minIdx].level / maxLevel) * chartH;
      ctx.fillStyle = 'rgba(255,209,102,0.6)';
      ctx.fillText('BAJA', lowX, lowY + 18);
    }

    // ========== RENDER ==========
    function renderDashboard(marine, weather) {
      const now = new Date();

      const swell2Height = marine.hourly?.secondary_swell_wave_height?.[currentIdx] ?? 0;

      const swell2Period = marine.hourly?.secondary_swell_wave_period?.[currentIdx] ?? 0;

      // Wind swell = total wave - groundswell components
      const windSwellHeight = Math.max(0, Math.round((waveHeight - Math.sqrt(swellHeight ** 2 + swell2Height ** 2)) * 10) / 10);

      // Swell ratings
      const primaryRating = getSwellRating(swellHeight, swellPeriod);
      const secondaryRating = swell2Height > 0.1 ? getSwellRating(swell2Height, swell2Period) : null;
      const totalFaceRating = getSwellRating(waveHeight, wavePeriod);

      // Swell origin tracking
      const swellOrigin = swellPeriod > 0 ? getSwellOrigin(swellDir, swellPeriod) : null;

      const temp = weather.current?.temperature_2m ?? 0;

      // Water temp - real SST from API with Humboldt current coastal correction
      // The API gives open-ocean SST; nearshore upwelling from Humboldt current
      // cools water ~3°C on average in Coquimbo region
      const HUMBOLDT_CORRECTION = -3;
      const sstRaw = marine.hourly?.sea_surface_temperature?.[currentIdx] ?? null;
      const waterTemp = sstRaw !== null ? Math.round(sstRaw + HUMBOLDT_CORRECTION) : (() => {
        // Fallback: seasonal estimate for Coquimbo coast (Humboldt)
        const month = now.getMonth();
        return [15, 15, 14, 13, 12, 11, 10, 10, 10, 11, 12, 14][month];
      })();
      const waterTempDisplay = sstRaw !== null

      let suitRec = '';

              </div>
              <div class="compass">
                <div class="compass-arrow" style="transform: rotate(${windDir}deg)"></div>
                <div class="compass-labels">
                  <span class="n">N</span>
                  <span class="s">S</span>
                  <span class="e">E</span>
                  <span class="w">W</span>
                </div>
              </div>
              <div style="text-align:center;margin-top:8px">
                <span class="metric-value">${windDirName}</span>
                <span class="metric-unit">(${windDir}°)</span>
              </div>
            </div>

            <!-- Clima -->
            <div class="card">
              <div class="card-header">
                <div class="card-icon" style="background:rgba(6,214,160,0.15)">🌡️</div>
                <div class="card-title">Clima</div>
              </div>
              <div style="text-align:center;margin-bottom:14px">
                <span style="font-size:2rem">${getWeatherIcon(weatherCode)}</span>
                <span class="metric-big" style="margin-left:8px">${temp.toFixed(0)}</span>
                <span class="metric-unit">°C</span>
              </div>
              <div class="metric-row">
                <span class="metric-label">Max / Min</span>
                <span class="metric-value">${weather.daily?.temperature_2m_max?.[0]?.toFixed(0) ?? '--'}° / ${weather.daily?.temperature_2m_min?.[0]?.toFixed(0) ?? '--'}°</span>
              </div>
              <div class="metric-row">
                <span class="metric-label">Agua</span>
                <span class="metric-value" style="color:${waterTemp <= 12 ? 'var(--surf-cyan)' : waterTemp <= 15 ? 'var(--surf-teal)' : 'var(--surf-green)'}">${waterTempDisplay} <span class="metric-unit" style="color:rgba(255,255,255,0.3)">${waterTemp <= 12 ? 'Fria' : waterTemp <= 15 ? 'Fresca' : 'Templada'}</span></span>
              </div>
              <div class="metric-row">
                <span class="metric-label">UV</span>
                <span class="metric-value" style="color:${uvIndex > 8 ? 'var(--surf-red)' : uvIndex > 5 ? 'var(--surf-orange)' : 'var(--surf-green)'}">${uvIndex.toFixed(0)} <span class="metric-unit">${uvIndex > 8 ? 'Muy alto' : uvIndex > 5 ? 'Alto' : 'Moderado'}</span></span>
              </div>
            </div>

            <!-- Tabla Recomendada -->
            <div class="card card-full">
              <div class="card-header">
                <div class="card-icon" style="background:rgba(0,180,216,0.15)">🏄</div>
                <div class="card-title">Tabla Recomendada & Info del Spot</div>
              </div>
              <div class="board-indicators-layout">
              ${(() => { const br = getBoardRec(waveHeight, wavePeriod, windSpeed, spot.type); return `
              <div>
                <div class="board-rec" style="margin-top:0">
                  <div class="board-emoji">${br.emoji}</div>
                  <div class="board-info">
                    <div class="board-name">${br.board}</div>
                    <div class="board-size">Talla: ${br.size}</div>
                    <div class="board-detail">${br.detail}</div>
                    <div class="board-detail" style="margin-top:6px;color:var(--surf-yellow)">Quillas: ${br.quillas}</div>
                    <div class="board-detail" style="color:var(--surf-teal)">Nivel: ${br.nivel}</div>
                    <div class="board-detail" style="margin-top:4px;color:var(--surf-green);font-style:italic">💡 ${br.tip}</div>
                  </div>
                </div>
              </div>`; })()}
              <div class="indicator-grid">
                <div class="indicator">
                  <div class="indicator-emoji">🌅</div>
                  <div class="indicator-label">Amanecer</div>
                  <div class="indicator-value">${sunrise}</div>
                </div>
                <div class="indicator">
                  <div class="indicator-emoji">🌇</div>
                  <div class="indicator-label">Atardecer</div>
                  <div class="indicator-value">${sunset}</div>
                </div>
                <div class="indicator">
                  <div class="indicator-emoji">${moon.emoji}</div>
                  <div class="indicator-label">Luna</div>
                  <div class="indicator-value" style="font-size:0.75rem">${moon.name}</div>
                </div>
                <div class="indicator">
                  <div class="indicator-emoji">🤿</div>
                  <div class="indicator-label">Traje</div>
                  <div class="indicator-value" style="font-size:0.75rem">${suitRec}</div>
                </div>
                <div class="indicator">
                  <div class="indicator-emoji">🧭</div>
                  <div class="indicator-label">Cara: ${spot.facing}</div>
                  <div class="indicator-value" style="font-size:0.75rem">Swell: ${spot.bestSwell}</div>
                </div>
                <div class="indicator">
                  <div class="indicator-emoji">📍</div>
                  <div class="indicator-label">${spot.type}</div>
                  <div class="indicator-value" style="font-size:0.75rem">${spot.waveRange}</div>
                </div>
                <div class="indicator">
                  <div class="indicator-emoji">🎯</div>
                  <div class="indicator-label">Nivel</div>
                  <div class="indicator-value" style="font-size:0.7rem">${spot.level}</div>
                </div>
                <div class="indicator">
                  <div class="indicator-emoji">⚠️</div>
                  <div class="indicator-label">Peligros</div>
                  <div class="indicator-value" style="font-size:0.65rem">${spot.hazards}</div>
                </div>
              </div>
              </div>
            </div>

            <!-- Mareas -->
            <div class="card card-full">
              <div class="card-header">
                <div class="card-icon" style="background:rgba(0,180,216,0.15)">🌊</div>
                <div class="card-title">Mareas (estimacion) &mdash; ${moon.emoji} ${moon.effect}</div>
              </div>
              <canvas id="tide-chart" class="tide-canvas"></canvas>
            </div>
          </div>
        </div>

        <!-- TAB: Horario -->
        <div class="tab-content" id="tab-horario">
          <div class="grid">
            <div class="card card-full">
              <div class="card-header">
                <div class="card-icon" style="background:rgba(0,212,255,0.15)">⏱️</div>
                <div class="card-title">Pronostico Horario (Proximas 24h)</div>
              </div>
              <div class="hourly-scroll">${hourlyHtml}</div>
            </div>
          </div>
        </div>

        <!-- TAB: Semanal -->
        <div class="tab-content" id="tab-semanal">
          <div class="grid">
            <div class="card card-full">
              <div class="card-header">
                <div class="card-icon" style="background:rgba(6,214,160,0.15)">📅</div>
                <div class="card-title">Pronostico 16 Dias - ${currentSpot}</div>
              </div>
              ${forecastHtml}
            </div>
          </div>
        </div>

        <!-- TAB: Comparar -->
        <div class="tab-content" id="tab-comparar">
          <div class="grid">
            <div class="card card-full">
              <div class="card-header">
                <div class="card-icon" style="background:rgba(255,140,66,0.15)">⚡</div>
                <div class="card-title">Comparar Spots - Ahora</div>
              </div>
              <div class="compare-grid">${compareHtml}</div>
            </div>
          </div>
        </div>

        <div class="last-updated auto-refresh">
          <span class="auto-refresh-dot"></span>
          Actualizado: ${now.toLocaleString('es-CL')} &mdash; Auto-refresh cada 15 min
        </div>

        <footer class="footer">
          <p>SurfCoquimbo &mdash; Datos de <a href="https://open-meteo.com" target="_blank">Open-Meteo</a></p>
          <p style="margin-top:4px">${spot.desc}</p>
          <p style="margin-top:4px">Hecho con amor para la comunidad surfera de Coquimbo 🤙</p>
        </footer>
      `;

      // Draw tide chart after DOM is ready
      requestAnimationFrame(() => {
        drawTideChart('tide-chart', tideData, currentHour);
      });
    }

    // Select spot from compare
    function selectSpot(name) {
      const spot = SPOTS[name];
      if (!spot) return;
      currentSpot = name;

      // Update buttons
      document.querySelectorAll('.spot-btn').forEach(b => {
        if (b.textContent.trim() === name) {
          b.classList.add('active');
          document.getElementById('spot-name').textContent = b.dataset.name + ', Coquimbo';
        } else {
          b.classList.remove('active');
        }
      });

      // Switch to "Ahora" tab
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelector('.tab-btn[data-tab="ahora"]').classList.add('active');

      if (allSpotsData[name]) {
        currentData = allSpotsData[name];
        renderDashboard(allSpotsData[name].marine, allSpotsData[name].weather);
      } else {
        fetchData(spot.lat, spot.lon);
      }
    }

    // ========== INIT ==========
    fetchData(-30.0718, -71.3768);

    // Handle window resize for tide chart
    window.addEventListener('resize', () => {
      if (currentData) {
        const now = new Date();
        const tideData = getTideData(now);
        drawTideChart('tide-chart', tideData, now.getHours());
      }
    });
  </script>
</body>
</html>
